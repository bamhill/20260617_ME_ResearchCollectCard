<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}科研日报{% endblock %}</title>
<style>
  :root {
    --ink: #15130f;
    --paper: #e9e2d6;
    --red: #d7382f;
    --muted: #5c554c;
    --rule: #c4bbb0;
    --font-serif: "Noto Serif SC", "Songti SC", "SimSun", serif;
    --font-sans: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  }
  /*
   * Design rule: --muted (#5c554c) on --paper (#e9e2d6) = 5.3:1 contrast.
   * Meets WCAG AA for normal text. Small labels (section-count, meta, etc.)
   * must not go lighter than this.
   */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background:
      radial-gradient(circle at 30% 20%, rgba(255,255,255,0.26), transparent 28%),
      linear-gradient(135deg, rgba(21,19,15,0.035) 0 1px, transparent 1px 8px),
      var(--paper);
    color: var(--ink);
    font-family: var(--font-serif);
    line-height: 1.8;
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 40px 80px;
  }
  /* ===== COVER — compact, stats right ===== */
  .cover {
    padding: 36px 0 20px;
    border-bottom: 3px double var(--ink);
    position: relative;
    margin-bottom: 28px;
  }
  .cover::after {
    content: "◆";
    display: block;
    position: absolute;
    bottom: -9px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--paper);
    padding: 0 12px;
    font-size: 8px;
    color: var(--ink);
    letter-spacing: 0;
  }
  .cover-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 24px;
  }
  .cover-left { flex: 0 1 auto; }
  .cover-left .kicker {
    display: inline-block;
    background: var(--red);
    color: #fff;
    font-family: var(--font-sans);
    font-size: 10px;
    letter-spacing: 5px;
    padding: 4px 16px;
    margin-bottom: 14px;
  }
  .cover-left h1 {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 3px;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .cover-left .dateline {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
  }
  .cover-right {
    text-align: right;
    flex-shrink: 0;
    padding-bottom: 4px;
  }
  .cover-stat {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--ink);
    opacity: 0.55;
    letter-spacing: 1px;
    line-height: 1.8;
  }
  .cover-stat-num {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 700;
    color: var(--ink);
    margin-right: 2px;
  }
  .cover-team {
    font-family: var(--font-serif);
    font-size: 13px;
    font-style: italic;
    color: var(--ink);
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .cover-subtitle {
    font-family: var(--font-serif);
    font-size: 13px;
    font-style: italic;
    color: var(--red);
    letter-spacing: 1px;
    margin-bottom: 2px;
  }
  .cover-stat-label {
    font-family: var(--font-serif);
    font-size: 11px;
    font-style: italic;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 4px;
    opacity: 0.7;
  }
  .cover-rule {
    display: none;
  }

    /* ===== HOTSPOT — editorial two-column inset ===== */
  .hot-section {
    margin: 32px 0 16px;
    padding: 0 0 20px;
    border-bottom: 1px solid var(--rule);
  }
  .hot-columns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  .hot-col {
    background: rgba(21,19,15,0.03);
    border: 1px solid var(--rule);
    padding: 22px 24px 24px;
  }
  .hot-col-head {
    font-family: var(--font-serif);
    font-size: 24px;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--ink);
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--rule);
  }
  .hot-col-summary {
    font-family: var(--font-serif);
    font-size: 14px;
    font-style: italic;
    color: var(--muted);
    line-height: 1.9;
    margin-top: 16px;
    padding-top: 14px;
    border-top: 1px dotted var(--rule);
  }
  .hot-tags { line-height: 1.5; }
  .hot-tag {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--ink);
    white-space: nowrap;
  }
  .hot-tag::after {
    content: " · ";
    color: var(--red);
    font-weight: 700;
    opacity: 0.45;
  }
  .hot-tag:last-child::after { content: ""; }

  /* Method items */
  .hot-methods { line-height: 1.5; }
  .method-item { display: inline; }
  .method-trigger {
    cursor: pointer;
    white-space: nowrap;
    padding: 1px 4px;
    transition: background 0.15s;
  }
  .method-trigger:hover { background: rgba(21,19,15,0.05); }
  .method-name { font-weight: 600; font-size: 11px; }
  .method-count { font-size: 9px; color: var(--muted); margin-left: 2px; }
  .method-count::before { content: '('; }
  .method-count::after { content: ')'; }
  .method-arrow {
    font-size: 8px; color: var(--muted); margin-left: 2px;
    display: inline-block; transition: transform 0.2s;
  }
  .method-item[data-expanded="true"] .method-arrow { transform: rotate(90deg); }
  .method-item::after { content: " · "; color: var(--red); opacity: 0.35; }
  .method-item:last-child::after { content: ""; }

  .method-detail {
    display: none;
    margin: 8px 0 14px 8px;
    padding: 12px 16px;
    border-left: 2px solid var(--red);
    max-height: 296px;
    overflow-y: auto;
    font-family: var(--font-sans);
  }
  .method-item[data-expanded="true"] .method-detail { display: block; }
  .method-link {
    display: block;
    font-size: 12px;
    color: var(--ink);
    text-decoration: none;
    padding: 5px 0;
    line-height: 1.5;
    border-bottom: 1px dotted rgba(196,187,176,0.3);
  }
  .method-link:hover { color: var(--red); }
  .method-link:last-child { border-bottom: none; }

/* ===== SECTION HEADER ===== */
  .section-header {
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #fff;
    background: var(--red);
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
    padding: 4px 14px;
    margin: 24px 0 16px;
  }
  .section-count {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 1px;
    opacity: 0.75;
    margin-left: auto;
  }

  /* ===== CARD ITEM — left-sidebar layout ===== */
  .card-item {
    display: grid;
    grid-template-columns: 38px 1fr;
    gap: 14px;
    padding: 20px 0 18px;
    border-bottom: 1px dotted var(--rule);
    border-left: 2px solid transparent;
    padding-left: 10px;
    transition: border-left-color 0.2s;
    break-inside: avoid;
  }
  .card-item:hover { border-left-color: var(--red); }
  .card-item:last-child { border-bottom: none; }
  .card-item .sidebar {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding-top: 1px;
  }
  .card-item .num {
    display: block;
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 700;
    color: var(--red);
    line-height: 1;
    opacity: 0.45;
  }
  .card-item .sidebar .source-tag {
    font-family: var(--font-sans);
    font-size: 7px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.3px;
    line-height: 1.2;
    opacity: 0.55;
    max-width: 34px;
    word-break: break-all;
  }
  .card-item .body { min-width: 0; }
  .card-item h2 {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.5;
    letter-spacing: 0.3px;
    margin-bottom: 2px;
  }
  .card-item h2 a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .card-item h2 a:hover { color: var(--red); border-bottom-color: var(--red); }
  .card-item .meta {
    font-family: var(--font-sans);
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }
  .card-item .summary {
    font-size: 14px;
    color: #3a3630;
    margin-top: 6px;
    line-height: 1.7;
  }
  .summary-zh { color: #1a1815; }

  /* ===== TAGS ===== */
  .card-item .tags { margin-top: 8px; }
  .card-item .tag {
    display: inline-block;
    font-family: var(--font-sans);
    font-size: 10px;
    color: var(--muted);
    border: 1px solid var(--rule);
    padding: 2px 10px;
    margin-right: 6px;
    margin-top: 4px;
  }

  /* ===== FOOTER ===== */
  .source-footer {
    margin-top: 64px;
    padding-top: 28px;
    border-top: 3px double var(--rule);
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 1px;
  }
  .source-footer::before {
    content: "—  FIN  —";
    display: block;
    font-family: var(--font-serif);
    font-size: 12px;
    font-style: italic;
    color: var(--muted);
    margin-bottom: 16px;
    letter-spacing: 3px;
  }
  .save-btn {
    display: block;
    margin: 60px auto 0;
    padding: 12px 32px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: var(--font-sans);
    font-size: 13px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .save-btn:hover { background: var(--red); }
  @media print {
    .save-btn { display: none; }
    body { background: #fff; padding: 20px; }
  }
</style>
</head>
<body>
<div class="report" id="report">
{% block content %}{% endblock %}
</div>
<button class="save-btn" onclick="savePNG()">Save PNG</button>
<script>
async function savePNG() {
  var s = document.createElement('script');
  s.src = 'data:text/javascript;base64,{{ html2canvas_b64 }}';
  document.head.appendChild(s);
  await new Promise(function(r) { s.onload = r; });
  var el = document.getElementById('report');
  var canvas = await html2canvas(el, { scale: 2, backgroundColor: '#e9e2d6' });
  var a = document.createElement('a');
  a.download = '{{ filename }}.png';
  a.href = canvas.toDataURL();
  a.click();
}
</script>
</body>
</html>
